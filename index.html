<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>사례관리 기록지 · 공주시정신건강복지센터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>


<!-- 글로벌 내비: PC는 상단바, 모바일은 좌측 서랍 -->
<nav class="gnav" id="gnav">
  <button class="hamb" onclick="toggleDrawer()" aria-label="메뉴 열기">☰</button>
  <span class="logo"> 공주시정신건강복지센터</span>
  <a class="on pc-only">사례기록</a>
  <a class="pc-only" data-app="genogram" onclick="openApp('genogram')">가계도</a>
  <a class="pc-only" data-app="schedule" onclick="openApp('schedule')">일정</a>
  <a class="pc-only" data-app="inventory" onclick="openApp('inventory')">비품</a>
  <span class="sp"></span>
  <span class="who pc-only" id="gnavWho"></span>
</nav>

<!-- 좌측 서랍 (모바일에서만 실사용) -->
<div class="drawer-bg" id="drawerBg" onclick="toggleDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-org">공주시정신건강복지센터</div>
    <div class="drawer-who" id="drawerWho">—</div>
    <button class="drawer-close" onclick="toggleDrawer()" aria-label="닫기">×</button>
  </div>

  <div class="drawer-sec">앱 전환</div>
  <button class="drawer-it on"><span class="ic">📋</span>사례기록</button>
  <button class="drawer-it" data-app="genogram" onclick="drawerGo('genogram')"><span class="ic">🌳</span>가계도</button>
  <button class="drawer-it" data-app="schedule" onclick="drawerGo('schedule')"><span class="ic">🗓</span>일정</button>
  <button class="drawer-it" data-app="inventory" onclick="drawerGo('inventory')"><span class="ic">📦</span>비품</button>

  <div class="drawer-sec">관리</div>
  <button class="drawer-it" id="drawerAdmin" onclick="drawerAct('openAdmin')"><span class="ic">👥</span>기관 관리</button>
  <button class="drawer-it" id="drawerTips" onclick="drawerAct('openTipsEditor')"><span class="ic">💡</span>상담 팁 편집</button>
  <button class="drawer-it" onclick="drawerAct('openPinChange')"><span class="ic">🔒</span>PIN 변경</button>
  <button class="drawer-it" onclick="drawerAct('doLogout')"><span class="ic">🚪</span>로그아웃</button>
</aside>

<!-- ============ 로그인 / 가입 / 기관등록 ============ -->
<div id="scrAuth" class="auth-wrap hide">
  <div class="auth-box">
    <h1>사례관리 기록지</h1>
    <p class="sub">공주시정신건강복지센터 통합 플랫폼</p>

    <div class="authtabs">
      <button id="tabLogin" class="on" onclick="switchAuth('login')">로그인</button>
      <button id="tabSignup" onclick="switchAuth('signup')">직원 가입</button>
    </div>

    <div id="formLogin">
      <label>이메일</label><input id="liEmail" type="email" autocomplete="username">
      <label>비밀번호</label><input id="liPw" type="password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pill wide" id="btnLogin" onclick="doLogin()">로그인</button>
    </div>

    <div id="formSignup" class="hide">
      <label>이름</label><input id="suName">
      <label>기관 가입코드</label><input id="suCode" placeholder="관리자에게 받은 코드" style="text-transform:uppercase">
      <label>이메일</label><input id="suEmail" type="email" autocomplete="username">
      <label>비밀번호 <span style="font-weight:400;color:var(--muted48)">(6자 이상)</span></label>
      <input id="suPw" type="password" autocomplete="new-password">
      <button class="pill wide" id="btnSignup" onclick="doSignup()">가입 신청</button>
      <div class="auth-note">가입 후 기관 관리자의 승인이 필요합니다.<br>
        코드가 없다면 <a class="linkbtn" onclick="switchAuth('org')">기관을 새로 등록</a>하세요.</div>
    </div>

    <div id="formOrg" class="hide">
      <label>기관 이름</label><input id="orgName" placeholder="예: 공주시정신건강복지센터">
      <label>관리자 이름</label><input id="orgAdmin">
      <label>이메일</label><input id="orgEmail" type="email">
      <label>비밀번호 <span style="font-weight:400;color:var(--muted48)">(6자 이상)</span></label>
      <input id="orgPw" type="password">
      <button class="pill wide" id="btnOrg" onclick="doCreateOrg()">기관 등록</button>
      <div class="auth-note">등록하면 가입코드가 발급되고, 등록자가 관리자가 됩니다.<br>
        <a class="linkbtn" onclick="switchAuth('login')">로그인으로 돌아가기</a></div>
    </div>

    <div class="auth-err" id="authMsg"></div>
    <div class="auth-note" style="margin-top:16px">가계도 앱과 같은 계정을 사용합니다. 이미 가계도에 가입했다면 그 계정으로 로그인하세요.</div>
  </div>
</div>

<!-- ============ 승인 대기 ============ -->
<div id="scrPending" class="auth-wrap hide">
  <div class="auth-box" style="text-align:center">
    <h1 style="font-size:22px">승인 대기 중</h1>
    <p class="sub" style="margin-top:10px"><b id="pendOrg">—</b> 관리자가 계정을 승인하면<br>바로 이용할 수 있습니다.</p>
    <button class="pill gray wide" onclick="doLogout()">다른 계정으로 로그인</button>
  </div>
</div>

<!-- ============ PIN ============ -->
<div id="scrPin" class="auth-wrap hide">
  <div class="auth-box" style="text-align:center">
    <h1 style="font-size:22px" id="pinTitle">PIN 입력</h1>
    <p class="sub" id="pinDesc" style="margin-top:8px"></p>
    <div class="pindots" id="pinDots"></div>
    <div class="pinpad">
      <button onclick="pinKey('1')">1</button><button onclick="pinKey('2')">2</button><button onclick="pinKey('3')">3</button>
      <button onclick="pinKey('4')">4</button><button onclick="pinKey('5')">5</button><button onclick="pinKey('6')">6</button>
      <button onclick="pinKey('7')">7</button><button onclick="pinKey('8')">8</button><button onclick="pinKey('9')">9</button>
      <button class="blank"></button><button onclick="pinKey('0')">0</button><button onclick="pinDel()">←</button>
    </div>
    <button class="linkbtn" onclick="doLogout()" style="margin-top:18px">로그아웃</button>
  </div>
</div>

<!-- ============ 사례 목록 (시안 D) ============ -->
<div id="scrList" class="hide">
  <div class="subnav">
    <div class="cat">사례 목록<small id="listCount"></small></div>
    <span class="sp"></span>
    <button class="pill" onclick="openNewCase()">＋ 새 사례</button>
  </div>
  <div class="screen">
    <div class="kpi" id="kpiBar"></div>
    <div class="search">🔍<input id="q" placeholder="사례번호 · 이름 · 담당자 검색" oninput="renderList()"></div>
    <div class="listhead"><span>사례번호</span><span>이름</span><span>담당자 · 수정일</span><span>진행률</span><span>작업</span></div>
    <div class="grid" id="caseList"></div>
  </div>
</div>

<!-- ============ 편집 화면 (시안 B) ============ -->
<div id="scrEdit" class="hide">
  <div class="subnav">
    <button class="nlink" onclick="backToList()">‹ 목록</button>
    <div class="cat" id="edTitle" style="font-size:16px"></div>
    <span class="sp"></span>
    <button class="nlink" onclick="openCaseSettings()">사례 설정</button>
    <div class="segment" id="segMode">
      <button data-mode="mse" onclick="switchMode('mse')">사례관리 기록</button>
      <button data-mode="gs"  onclick="switchMode('gs')">일반상담</button>
      <button data-mode="is"  onclick="switchMode('is')">개별상담</button>
    </div>
  </div>
  <div class="subnav sub2 hide" id="tabsBar">
    <div class="tabstrip" id="tabs"></div>
  </div>
  <div class="editwrap">
    <aside class="tocpane" id="tocPane"></aside>
    <div class="screen" id="tabBody"></div>
    <aside class="tippane" id="tipPane"></aside>
  </div>
  <div class="sticky" id="stickyBar">
    <span class="state" id="stState"></span>
    <span class="sp"></span>
    <button class="pill gray" id="btnPrev" onclick="stepTab(-1)">이전</button>
    <button class="pill" id="btnNext" onclick="stepTab(1)">다음 섹션</button>
  </div>
</div>

<div id="modalHost"></div>
<div class="toast" id="toast"></div>
<div id="printArea"></div>

<!-- ===== 스크립트 로드 순서 중요 =====
     config → crypto → schema → auth(상태·헬퍼·인증) → app → admin → main(부팅) -->
<script src="firebase-config.js"></script>
<script src="crypto.js"></script>
<script src="schema.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script src="admin.js"></script>
<script src="main.js"></script>
</body>
</html>
